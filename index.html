<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Japan 2026">
  <meta name="theme-color" content="#F8F6F1" id="theme-color-meta">
  <title>Japan 2026 — Gwendalynn &amp; Christina</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@300;400;500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500@display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Backgrounds — synced with landing page */
      --bg:           #F0EAE0;
      --card:         #FDFAF4;
      --past-bg:      #F7F4EE;
      --today-bg:     #FBF0EA;
      /* Text */
      --text:         #16120C;
      --muted:        #5A5450;
      --light:        #9A938C;
      /* Borders */
      --border:       #D8D0C6;
      --border-light: #E8E2D8;
      /* Terracotta accent — matches landing page */
      --red:          #B85C38;
      --red-dark:     #9A4828;
      --terra-bg:     #FBF0EA;
      /* Status: confirmed */
      --green-bg:     #EDF7F2;
      --green-text:   #266B32;
      --green-border: #B8D9C4;
      /* Status: tip/warning */
      --amber-bg:     #FEF8EC;
      --amber-text:   #7A5800;
      --amber-border: #E8D090;
      /* Fonts */
      --sans:  'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      --mono:  'SF Mono', 'Fira Code', 'Courier New', monospace;
      --serif: 'Shippori Mincho', Georgia, serif;
      /* Misc */
      --shadow: 0 2px 16px rgba(22,18,12,0.07);
      --today-border: #B85C38;
      /* Activity dot colors */
      --dot-booked:   #B85C38;
      --dot-default:  #C8C0B6;
    }

    body.dark {
      --bg:           #141414;
      --card:         #1E1E1E;
      --past-bg:      #181816;
      --today-bg:     #1C1010;
      --text:         #E4E4E4;
      --muted:        #909090;
      --light:        #525252;
      --border:       #2E2E2E;
      --border-light: #262626;
      --green-bg:     #0E220E;
      --green-text:   #7DC47D;
      --green-border: #1E441E;
      --amber-bg:     #1A1200;
      --amber-text:   #E8C060;
      --amber-border: #3A2800;
      --shadow: 0 2px 12px rgba(0,0,0,0.35);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      transition: background 0.2s, color 0.2s;
    }

    .hidden { display: none !important; }

    /* Serif is ONLY for the brand mark */
    .brand { font-family: var(--serif); }

    ═══════════════════════════════════════════════ */

    /* ═══════════════════════════════════════════════
       MAIN APP
    ═══════════════════════════════════════════════ */
    #app { position: relative; z-index: 1; }

    /* HEADER */
    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 200;
      transition: background 0.2s, border-color 0.2s;
    }

    .header-main {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 14px 20px 10px;
      gap: 12px;
    }

    .header-left { flex: 1; min-width: 0; }

    .site-title {
      font-family: var(--serif);
      font-size: 18px;
      font-weight: 400;
      letter-spacing: 0.14em;
      color: var(--text);
      line-height: 1.2;
      cursor: pointer;
    }

    .header-meta { display: flex; align-items: center; gap: 10px; margin-top: 4px; flex-wrap: wrap; }
    .trip-status { font-size: 13px; color: var(--muted); letter-spacing: 0.03em; }
    .trip-status strong { color: var(--red); font-weight: 600; }
    .jst-clock { font-family: var(--mono); font-size: 12px; color: var(--light); border-left: 1px solid var(--border); padding-left: 10px; }

    .header-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

    .icon-btn {
      background: none;
      border: 1px solid var(--border);
      width: 32px;
      height: 32px;
      border-radius: 2px;
      cursor: pointer;
      color: var(--muted);
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.15s, color 0.15s;
      flex-shrink: 0;
    }

    .icon-btn:hover { border-color: var(--red); color: var(--red); }

    .edit-btn {
      background: none;
      border: 1px solid var(--border);
      padding: 6px 12px;
      border-radius: 2px;
      font-size: 11px;
      cursor: pointer;
      color: var(--muted);
      letter-spacing: 0.07em;
      white-space: nowrap;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .edit-btn:hover { border-color: var(--red); color: var(--red); }
    .edit-btn.active { background: var(--red); border-color: var(--red); color: #fff; }
    .user-avatar { width: 20px; height: 20px; border-radius: 50%; display: none; }
    .edit-btn.active .user-avatar { display: block; }

    .viewonly-hint { font-size: 10px; color: var(--light); letter-spacing: 0.04em; }
    body.edit-mode .viewonly-hint { display: none; }

    /* TABS — scrollable single row */
    .tabs-row {
      display: flex;
      padding: 0 20px;
      border-top: 1px solid var(--border-light);
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .tabs-row::-webkit-scrollbar { display: none; }

    nav { display: flex; min-width: max-content; }

    .tab-btn {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      padding: 12px 18px 12px 0;
      font-size: 14px;
      cursor: pointer;
      color: var(--light);
      letter-spacing: 0.04em;
      margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
    }

    .tab-btn.active { color: var(--text); border-bottom-color: var(--red); }
    .tab-btn:hover:not(.active) { color: var(--muted); }

    /* DEST PILLS */
    .dest-pills-wrap {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 107px;
      z-index: 190;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      transition: background 0.25s;
    }

    .dest-pills-wrap::-webkit-scrollbar { display: none; }
    .dest-pills { display: flex; gap: 6px; padding: 8px 20px; min-width: max-content; }

    .dest-pill {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.04em;
      padding: 6px 15px;
      border: 1px solid var(--border);
      border-radius: 20px;
      cursor: pointer;
      color: var(--muted);
      background: none;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .dest-pill:hover { border-color: var(--red); color: var(--red); }
    .dest-pill.active { background: var(--red); border-color: var(--red); color: #fff; }

    /* MAIN */
    main { max-width: 720px; margin: 0 auto; padding: 28px 20px 120px; }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* TRIP SUMMARY BAR (top of itinerary) */
    .trip-summary-bar {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 14px 16px;
      margin-bottom: 24px;
    }

    .tsb-top { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 10px; flex-wrap: wrap; gap: 4px; }
    .tsb-title { font-size: 11px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text); }
    .tsb-dates { font-size: 10px; color: var(--light); font-family: var(--mono); }

    .tsb-bar { display: flex; height: 5px; border-radius: 3px; overflow: hidden; gap: 1px; margin-bottom: 8px; }

    .tsb-labels {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 4px;
    }

    .tsb-label-item { display: flex; align-items: center; gap: 4px; font-size: 9.5px; color: var(--muted); }
    .tsb-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

    /* DEST SECTIONS */
    .dest-section { margin-bottom: 36px; }

    .dest-header { display: flex; align-items: baseline; gap: 12px; padding-bottom: 10px; border-bottom: 1px solid var(--border); margin-bottom: 10px; }
    .dest-name { font-size: 11px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--light); }
    .dest-dates-label { font-size: 12px; color: var(--light); letter-spacing: 0.04em; }

    /* DAY CARDS */
    .day-card { background: var(--card); border: 1px solid var(--border); border-radius: 2px; margin-bottom: 6px; overflow: hidden; transition: border-color 0.15s, background 0.25s; }
    .day-card.past { background: var(--past-bg); border-color: var(--border-light); }
    .day-card.past .day-title { color: var(--muted); }
    .day-card.past .day-date, .day-card.past .day-location { color: var(--border); }
    .day-card.today { border-color: var(--today-border); border-width: 1.5px; }
    .day-card.today .day-header { background: var(--today-bg); }

    .today-badge {
      display: inline-block;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 10px;
      background: var(--red);
      color: #fff;
      margin-left: 8px;
      vertical-align: middle;
    }

    /* DAY HEADER */
    .day-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      cursor: pointer;
      user-select: none;
      gap: 10px;
      transition: background 0.15s;
    }

    .day-header:hover { background: var(--bg); }
    .day-card.today .day-header:hover { background: var(--today-bg); }

    .day-header-left { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; flex: 1; min-width: 0; }
    .day-date { font-family: var(--mono); font-size: 12px; color: var(--light); white-space: nowrap; letter-spacing: 0.03em; flex-shrink: 0; }
    .day-title-wrap { min-width: 0; }
    .day-title { font-size: 15px; font-weight: 500; color: var(--text); }
    .day-location { font-size: 13px; color: var(--light); margin-top: 1px; }
    .day-header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .notes-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--red); display: none; }
    body.edit-mode .notes-dot.has-notes { display: block; }
    .day-toggle { font-size: 10px; color: var(--light); transition: transform 0.18s; }
    .day-card.expanded .day-toggle { transform: rotate(180deg); }

    /* DAY BODY */
    .day-body { display: none; padding: 4px 18px 18px; border-top: 1px solid var(--border-light); }
    .day-card.expanded .day-body { display: block; }
    .day-card.past .day-body { opacity: 0.7; }

    /* PERIOD */
    .period { margin-top: 14px; }
    .period-label { font-size: 10px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--light); margin-bottom: 8px; margin-top: 6px; }

    /* ACTIVITY ROWS */
    .act { display: grid; grid-template-columns: 10px 68px 1fr; gap: 8px; padding: 5px 0; align-items: start; }
    .act-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--dot-default); margin-top: 6px; flex-shrink: 0; }
    .act.booked .act-dot { background: var(--dot-booked); }
    .act-time { font-family: var(--mono); font-size: 12px; color: var(--light); padding-top: 2px; line-height: 1.4; }
    .act-body { min-width: 0; }
    .act-text { font-size: 15px; color: var(--text); line-height: 1.5; }
    .act.booked .act-text { color: var(--green-text); }
    .act-sub { font-size: 13px; color: var(--muted); margin-top: 2px; line-height: 1.45; }
    .act-duration { font-size: 12px; color: var(--light); font-family: var(--mono); margin-top: 2px; }

    .tag { display: inline-block; font-size: 9px; font-weight: 700; letter-spacing: 0.1em; padding: 2px 6px; border-radius: 2px; vertical-align: middle; margin-left: 6px; }
    .tag-booked { background: var(--green-bg); color: var(--green-text); border: 1px solid var(--green-border); font-weight: 700; }

    /* TIP */
    .tip-block { margin-top: 12px; padding: 10px 12px; background: var(--amber-bg); border: 1px solid var(--amber-border); border-left: 3px solid #D4900A; font-size: 12px; color: var(--amber-text); line-height: 1.5; }
    .tip-label { font-weight: 700; letter-spacing: 0.04em; color: var(--amber-text); }

    /* NOTES */
    .notes-section { margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--border-light); }
    .notes-label { font-size: 9.5px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: var(--light); margin-bottom: 6px; }
    .notes-read { font-size: 14px; color: var(--muted); line-height: 1.6; }
    .notes-read em { font-style: italic; color: var(--light); }
    .notes-edit { width: 100%; min-height: 64px; padding: 10px 12px; font-size: 14px; font-family: inherit; color: var(--text); background: var(--bg); border: 1px solid var(--border); border-radius: 2px; resize: vertical; line-height: 1.5; transition: background 0.25s, border-color 0.15s; }
    .notes-edit:focus { outline: none; border-color: var(--red); }
    body.edit-mode .notes-read { display: none; }
    body:not(.edit-mode) .notes-edit { display: none; }
    body:not(.edit-mode) .save-indicator { display: none; }
    .save-indicator { font-size: 11px; color: var(--light); margin-top: 3px; min-height: 14px; }

    /* CONFIRMATIONS */
    .conf-group { margin-bottom: 36px; }
    .conf-group-title { font-size: 10px; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase; color: var(--light); padding-bottom: 10px; border-bottom: 1px solid var(--border); margin-bottom: 10px; }
    .conf-card { background: var(--card); border: 1px solid var(--border); border-radius: 2px; padding: 14px 16px; margin-bottom: 8px; transition: background 0.25s; }
    .conf-name { font-size: 15px; font-weight: 600; margin-bottom: 12px; color: var(--text); }
    .conf-number-row { display: flex; align-items: baseline; gap: 10px; background: var(--green-bg); border: 1px solid var(--green-border); border-radius: 2px; padding: 8px 12px; margin-bottom: 10px; }
    .conf-number-label { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; color: var(--green-text); text-transform: uppercase; flex-shrink: 0; }
    .conf-number-val { font-family: var(--mono); font-size: 16px; font-weight: 700; color: var(--green-text); letter-spacing: 0.04em; word-break: break-all; }
    .conf-row { display: flex; gap: 10px; padding: 6px 0; font-size: 13.5px; border-bottom: 1px solid var(--border-light); }
    .conf-row:last-child { border-bottom: none; }
    .conf-key { color: var(--light); font-size: 12px; min-width: 100px; flex-shrink: 0; padding-top: 1px; }
    .conf-val { flex: 1; color: var(--text); }
    .conf-val.mono { font-family: var(--mono); font-size: 12px; }
    .conf-val a { color: var(--red); text-decoration: none; }
    .conf-val a:hover { text-decoration: underline; }

    /* COST SUMMARY */
    .cost-summary-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 16px;
      margin-bottom: 28px;
    }

    .cost-summary-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--light);
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border-light);
    }

    .cost-row { display: flex; justify-content: space-between; padding: 7px 0; font-size: 14px; border-bottom: 1px solid var(--border-light); }
    .cost-row:last-of-type { border-bottom: none; }
    .cost-label { color: var(--muted); font-size: 14px; }
    .cost-vals { text-align: right; }
    .cost-jpy { font-family: var(--mono); font-size: 14px; color: var(--text); }
    .cost-usd { font-size: 10.5px; color: var(--light); }

    .cost-total-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0 4px;
      margin-top: 8px;
      border-top: 1px solid var(--border);
      font-weight: 500;
    }

    .cost-total-label { font-size: 13px; color: var(--text); }
    .cost-total-jpy { font-family: var(--mono); font-size: 15px; color: var(--red); font-weight: 600; }
    .cost-total-usd { font-size: 11px; color: var(--muted); }

    /* CHECKLIST */
    .checklist-section { margin-bottom: 28px; }

    .checklist-section-hd {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 10px;
      cursor: pointer;
      user-select: none;
    }

    .checklist-title { font-size: 11px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text); }
    .checklist-progress { font-size: 11px; color: var(--light); display: flex; align-items: center; gap: 8px; }
    .checklist-progress span { color: var(--green-text); font-weight: 600; }
    .checklist-toggle { font-size: 10px; color: var(--light); transition: transform 0.18s; }
    .checklist-section.expanded .checklist-toggle { transform: rotate(180deg); }
    .checklist-items { display: none; }
    .checklist-section.expanded .checklist-items { display: block; }
    .checklist-section.booked-section .checklist-items { opacity: 0.65; }

    .check-item { display: flex; align-items: flex-start; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border-light); cursor: pointer; user-select: none; }
    .check-item:last-child { border-bottom: none; }
    .check-box { margin-top: 2px; width: 15px; height: 15px; border: 1.5px solid var(--border); border-radius: 3px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
    .check-box.checked { background: var(--red); border-color: var(--red); }
    .check-box.checked::after { content: '✓'; font-size: 10px; color: #fff; font-weight: 700; }
    .check-label { font-size: 15px; color: var(--text); line-height: 1.5; flex: 1; }
    .check-sub { font-size: 13px; color: var(--muted); margin-top: 2px; }
    .check-item.done .check-label { color: var(--light); text-decoration: line-through; }
    .check-item.done .check-sub { color: var(--border); }

    /* JAPAN TIPS */
    .tips-section { margin-bottom: 32px; }
    .tips-section-title { font-size: 11px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--light); padding-bottom: 10px; border-bottom: 1px solid var(--border); margin-bottom: 12px; }

    .tip-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 14px 16px;
      margin-bottom: 8px;
    }

    .tip-card-title { font-size: 15px; font-weight: 500; margin-bottom: 8px; color: var(--text); }
    .tip-card-body { font-size: 14px; color: var(--muted); line-height: 1.65; }
    .tip-card-body strong { color: var(--text); font-weight: 500; }

    .tip-phrase-row { display: flex; gap: 8px; padding: 5px 0; border-bottom: 1px solid var(--border-light); font-size: 12.5px; }
    .tip-phrase-row:last-child { border-bottom: none; }
    .tip-phrase-jp { font-weight: 500; color: var(--text); min-width: 110px; }
    .tip-phrase-en { color: var(--muted); }
    .tip-phrase-rom { font-family: var(--mono); font-size: 11px; color: var(--light); min-width: 120px; }

    /* CURRENCY */
    .currency-fab {
      position: fixed;
      bottom: 24px;
      right: 20px;
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: var(--red);
      color: #fff;
      border: none;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      box-shadow: 0 3px 14px rgba(192,57,43,0.35);
      z-index: 300;
      transition: transform 0.15s, box-shadow 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .currency-fab:hover { transform: scale(1.08); }

    .currency-widget {
      position: fixed;
      bottom: 80px;
      right: 20px;
      width: 238px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: var(--shadow);
      z-index: 301;
      overflow: hidden;
      transition: background 0.25s;
    }

    .currency-widget.hidden { display: none; }

    .currency-hd { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-bottom: 1px solid var(--border-light); }
    .currency-hd-title { font-size: 12px; font-weight: 600; color: var(--text); letter-spacing: 0.04em; }
    .currency-close { background: none; border: none; cursor: pointer; color: var(--light); font-size: 16px; line-height: 1; padding: 0; }
    .currency-body { padding: 14px; }
    .curr-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .curr-flag { font-size: 14px; font-weight: 600; color: var(--muted); min-width: 16px; }
    .curr-input { flex: 1; padding: 8px 10px; font-size: 15px; font-family: var(--mono); font-weight: 500; color: var(--text); background: var(--bg); border: 1px solid var(--border); border-radius: 4px; width: 0; transition: border-color 0.15s, background 0.25s; }
    .curr-input:focus { outline: none; border-color: var(--red); }
    .curr-code { font-size: 11px; color: var(--light); min-width: 28px; font-weight: 600; letter-spacing: 0.05em; }
    .curr-swap { text-align: center; margin-bottom: 8px; color: var(--light); font-size: 16px; }
    .curr-rate { font-size: 11px; color: var(--light); text-align: center; margin-top: 10px; }

    /* BACK TO TOP */
    .back-top {
      position: fixed;
      bottom: 24px;
      right: 76px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--muted);
      cursor: pointer;
      font-size: 14px;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 299;
      box-shadow: var(--shadow);
      transition: all 0.15s;
    }

    .back-top.visible { display: flex; }
    .back-top:hover { border-color: var(--red); color: var(--red); }

    /* AUTH MODAL */
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 400; align-items: center; justify-content: center; }
    .overlay.open { display: flex; }

    .auth-modal {
      background: var(--card);
      border-radius: 8px;
      padding: 32px 28px;
      width: 320px;
      max-width: 92vw;
      text-align: center;
      box-shadow: var(--shadow);
      position: relative;
    }

    .auth-modal-close { position: absolute; top: 12px; right: 16px; background: none; border: none; font-size: 18px; cursor: pointer; color: var(--light); line-height: 1; }
    .auth-logo { font-family: var(--serif); font-size: 22px; letter-spacing: 0.14em; color: var(--text); margin-bottom: 6px; }
    .auth-subtitle { font-size: 12px; color: var(--light); margin-bottom: 24px; }

    .google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 11px 16px;
      border: 1.5px solid var(--border);
      border-radius: 4px;
      background: var(--card);
      color: var(--text);

      font-weight: 500;

      transition: border-color 0.15s, box-shadow 0.15s;

    .google-btn:hover { border-color: #4285F4; box-shadow: 0 1px 6px rgba(66,133,244,0.2); }
    .auth-note { font-size: 11px; color: var(--light); margin-top: 14px; }
    .auth-err { font-size: 12px; color: var(--red); margin-top: 10px; min-height: 14px; }

    /* MOBILE */
    /* TOAST */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1a1a1a;
      color: #fff;
      font-size: 12.5px;
      padding: 9px 18px;
      border-radius: 20px;
      z-index: 500;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      white-space: nowrap;
    }
    body.dark .toast { background: #E8E8E8; color: #111; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* AUTH GATE — shown on confirmations/budget when not signed in */
    .auth-gate {
      text-align: center;
      padding: 64px 24px;
    }
    .auth-gate-icon { font-size: 32px; margin-bottom: 16px; opacity: 0.4; }
    .auth-gate-title { font-size: 18px; font-weight: 500; color: var(--text); margin-bottom: 10px; }
    .auth-gate-sub { font-size: 15px; color: var(--muted); margin-bottom: 28px; line-height: 1.65; }
    .auth-gate-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--red);
      color: #fff;
      border: none;
      padding: 12px 24px;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .auth-gate-btn:hover { opacity: 0.88; }

    /* PAST DAYS TOGGLE */
    .itinerary-toolbar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      margin-bottom: 16px;
    }
    .past-toggle-btn {
      font-size: 11px;
      color: var(--muted);
      background: none;
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 5px 11px;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: all 0.15s;
    }
    .past-toggle-btn:hover { border-color: var(--red); color: var(--red); }
    .past-toggle-btn.hiding { color: var(--light); }

    /* COPY BUTTON */
    .copy-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 11px;
      color: var(--light);
      padding: 2px 6px;
      border-radius: 3px;
      letter-spacing: 0.04em;
      transition: all 0.12s;
      vertical-align: middle;
      margin-left: 4px;
    }
    .copy-btn:hover { background: var(--green-bg); color: var(--green-text); }

    /* QUICK DATE BUTTONS */
    .exp-quick-dates {
      display: flex;
      gap: 6px;
      margin-bottom: 4px;
    }
    .exp-quick-date {
      flex: 1;
      padding: 8px;
      font-size: 12px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.12s;
      text-align: center;
    }
    .exp-quick-date.active { background: var(--red); border-color: var(--red); color: #fff; }
    .exp-quick-date:hover:not(.active) { border-color: var(--red); color: var(--red); }

    /* EXPENSE DAY GROUP */
    .exp-day-group { margin-bottom: 16px; }
    .exp-day-hd {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--light);
      padding: 6px 0 6px;
      border-bottom: 1px solid var(--border-light);
      margin-bottom: 6px;
    }
    .exp-day-total { font-family: var(--mono); font-size: 11px; color: var(--muted); }

    @media (max-width: 600px) {
      .back-top { right: 72px; bottom: 20px; }
      .currency-fab { bottom: 20px; right: 16px; }
      .currency-widget { right: 12px; bottom: 76px; }
    }

    /* ═══════════════ OVERVIEW TAB ═══════════════ */

    .ov-wrap { max-width: 680px; margin: 0 auto; }

    /* Hero */
    .ov-hero {
      text-align: center;
      padding: 44px 0 36px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 44px;
    }

    .ov-kana {
      font-family: var(--serif);
      font-size: 12px; font-weight: 300;
      letter-spacing: 0.6em; color: var(--light);
      display: block; margin-bottom: 14px;
    }

    .ov-title {
      font-family: var(--serif);
      font-size: clamp(40px, 9vw, 72px);
      font-weight: 400; letter-spacing: 0.04em;
      color: var(--text); line-height: 1;
      margin-bottom: 8px;
    }

    .ov-who { font-size: 15px; color: var(--muted); margin-bottom: 28px; }

    .ov-cd { margin-bottom: 20px; }

    .ov-cd-num {
      font-family: var(--serif);
      font-size: clamp(54px, 12vw, 90px);
      font-weight: 300; color: var(--text);
      line-height: 1; letter-spacing: -0.02em; display: block;
    }

    .ov-cd-label {
      font-size: 12px; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--muted);
      display: block; margin-top: 6px;
    }

    .ov-cd-live { display: flex; flex-direction: column; align-items: center; gap: 5px; }

    .ov-cd-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green-text);
      box-shadow: 0 0 0 4px rgba(38,107,50,0.13);
      animation: pulse 2.2s ease-in-out infinite;
      margin-bottom: 6px;
    }

    .ov-cd-city {
      font-family: var(--serif);
      font-size: clamp(28px, 6vw, 48px);
      font-weight: 400; color: var(--text); line-height: 1.1;
    }

    .ov-cd-done { font-size: 15px; color: var(--muted); }

    .ov-meta {
      font-size: 13px; color: var(--light);
      letter-spacing: 0.04em;
    }

    /* Section label */
    .ov-section-label {
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.24em; text-transform: uppercase;
      color: var(--light); margin-bottom: 28px;
    }

    /* Journey timeline */
    .ov-journey { margin-bottom: 40px; }

    .ov-stop {
      display: grid;
      grid-template-columns: 28px 1fr;
      gap: 0;
      margin-bottom: 0;
    }

    /* Left column: dot + line */
    .ov-stop-left {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 5px;
    }

    .ov-stop-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--red);
      border: 2px solid var(--card);
      box-shadow: 0 0 0 1px var(--red);
      flex-shrink: 0; z-index: 1;
    }

    .ov-stop-line {
      width: 1px;
      flex: 1;
      background: var(--border);
      margin-top: 4px;
      min-height: 32px;
    }

    /* Right column */
    .ov-stop-right { padding: 0 0 36px 16px; }
    .ov-stop-last .ov-stop-right { padding-bottom: 8px; }

    .ov-stop-head {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 6px;
      flex-wrap: wrap;
    }

    .ov-stop-city {
      font-family: var(--serif);
      font-size: 28px; font-weight: 400;
      color: var(--text); line-height: 1.1;
    }

    .ov-stop-dates {
      font-size: 13px; color: var(--light);
      letter-spacing: 0.03em; padding-top: 3px;
    }

    .ov-stop-hotel {
      font-size: 13px; color: var(--muted);
      margin-bottom: 14px;
      display: flex; align-items: center; gap: 7px;
    }

    .ov-stop-hotel::before {
      content: '';
      width: 12px; height: 1px;
      background: var(--border); flex-shrink: 0;
    }

    /* Highlights list */
    .ov-hls { list-style: none; margin-bottom: 4px; }

    .ov-hl {
      font-size: 15px; color: var(--text);
      line-height: 1.5;
      padding: 4px 0 4px 16px;
      position: relative;
    }

    .ov-hl::before {
      content: '';
      position: absolute;
      left: 0; top: 12px;
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--border);
    }

    .ov-hl-star::before { background: var(--red); }

    .ov-hl-link {
      color: var(--text);
      text-decoration: none;
    }

    .ov-hl-link:hover { text-decoration: underline; text-decoration-color: var(--red); }

    .ov-ext {
      font-size: 11px;
      color: var(--red);
      margin-left: 3px;
      opacity: 0.8;
    }

    /* Day trips */
    .ov-dt {
      background: var(--bg);
      border: 1px solid var(--border);
      border-left: 2px solid var(--red);
      border-radius: 0 4px 4px 0;
      padding: 12px 14px 10px;
      margin: 12px 0 4px 0;
    }

    .ov-dt-head {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .ov-dt-label {
      font-size: 9px; font-weight: 700;
      letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--red); flex-shrink: 0;
    }

    .ov-dt-city {
      font-family: var(--serif);
      font-size: 18px; font-weight: 400;
      color: var(--text);
    }

    .ov-dt-note { font-size: 12px; color: var(--light); }

    .ov-dt-hls { list-style: none; }

    .ov-dt-hls .ov-hl { font-size: 14px; }

    /* CTA at bottom */
    .ov-cta-row {
      text-align: center;
      padding: 28px 0 8px;
      border-top: 1px solid var(--border);
    }

    .ov-cta {
      background: var(--text);
      color: var(--bg);
      border: none;
      padding: 14px 44px;
      font-size: 12px; font-weight: 500;
      letter-spacing: 0.18em; text-transform: uppercase;
      border-radius: 2px; cursor: pointer;
      font-family: var(--sans);
      transition: background 0.15s;
    }

    .ov-cta:hover { background: var(--red); }


    /* Waypoint stops (Kawaguchiko, Nara, Osaka) — smaller, indented */
    .ov-stop-waypoint .ov-stop-right { padding-left: 16px; }
    .ov-stop-right-wp { padding-bottom: 24px !important; }

    .ov-stop-dot-sm {
      width: 8px; height: 8px;
      background: var(--border) !important;
      box-shadow: 0 0 0 1px var(--border) !important;
      border: none;
    }

    .ov-wp-badge {
      font-size: 9px; font-weight: 700;
      letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--red);
      background: var(--terra-bg);
      border: 1px solid rgba(184,92,56,0.2);
      padding: 2px 8px; border-radius: 10px;
      flex-shrink: 0;
    }

    .ov-wp-city {
      font-size: 22px !important;
      color: var(--muted) !important;
    }

    .ov-stop-waypoint .ov-stop-hotel {
      font-size: 12px;
      color: var(--light);
    }

    .ov-stop-waypoint .ov-hl {
      font-size: 14px;
      color: var(--muted);
    }

    .ov-stop-waypoint .ov-hl-star::before { background: var(--red); opacity: 0.6; }


    /* ═══════════════ PRE-TRIP TAB ═══════════════ */

    /* Sub-tabs */
    .pt-tabs {
      display: flex;
      gap: 2px;
      margin-bottom: 24px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3px;
    }

    .pt-tab {
      flex: 1;
      background: none;
      border: none;
      border-radius: 2px;
      padding: 9px 12px;
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 400;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.14s;
      letter-spacing: 0.02em;
    }

    .pt-tab:hover { color: var(--text); }

    .pt-tab.pt-tab-on {
      background: var(--card);
      color: var(--text);
      font-weight: 500;
      box-shadow: 0 1px 4px rgba(22,18,12,0.08);
    }

    .pt-panel { }

    /* Urgent items */
    .pt-urgent-wrap {
      background: var(--amber-bg);
      border: 1px solid var(--amber-border);
      border-left: 3px solid #C4820A;
      border-radius: 4px;
      margin-bottom: 24px;
      overflow: hidden;
    }

    .pt-urgent-hd {
      padding: 10px 16px 8px;
      border-bottom: 1px solid var(--amber-border);
    }

    .pt-urgent-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--amber-text);
    }

    .pt-urgent-item {
      padding: 12px 16px;
      border-bottom: 1px solid var(--amber-border);
    }

    .pt-urgent-item:last-child { border-bottom: none; }

    .pt-urgent-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 3px;
      line-height: 1.4;
    }

    .pt-urgent-sub {
      font-size: 12px;
      color: var(--amber-text);
      line-height: 1.5;
      margin-bottom: 6px;
    }

    .pt-urgent-link {
      display: inline-block;
      font-size: 12px;
      font-weight: 500;
      color: var(--red);
      text-decoration: none;
      border: 1px solid var(--red);
      padding: 3px 10px;
      border-radius: 3px;
      transition: background 0.12s, color 0.12s;
    }

    .pt-urgent-link:hover {
      background: var(--red);
      color: #fff;
    }


    /* ═══════════════ BUDGET UPDATES ═══════════════ */

    .settlement-banner {
      border-radius: 4px;
      padding: 16px 20px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
      background: var(--card);
    }

    .settlement-banner.owed {
      background: var(--amber-bg);
      border-color: var(--amber-border);
      border-left: 3px solid #C4820A;
    }

    .settlement-banner.settlement:not(.owed) {
      background: var(--green-bg);
      border-color: var(--green-border);
      border-left: 3px solid var(--green-text);
    }

    .settlement-main {
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
    }

    .settlement-sub {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    .stat-card-primary {
      background: var(--text) !important;
      border-color: var(--text) !important;
    }

    .stat-card-primary .stat-label,
    .stat-card-primary .stat-usd { color: rgba(255,255,255,0.5) !important; }
    .stat-card-primary .stat-jpy { color: #fff !important; }

  </style>
</head>

<!-- Cherry blossom canvas — always present -->

<!-- ═══ MAIN APP ═══ -->
<div id="app">

  <header>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Expense Modal -->
<div class="overlay" id="expenseOverlay">
  <div class="expense-modal">
    <div class="exp-modal-hd">
      <span class="exp-modal-title">Add Expense</span>
      <button class="auth-modal-close" id="expModalClose">&times;</button>
    </div>

    <!-- Amount -->
    <div class="exp-field">

.lightbox-close-btn { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25); border-radius: 3px; padding: 6px 14px; color: #fff; font-size: 12px; cursor: pointer; transition: background 0.12s; }
.lightbox-close-btn:hover { background: rgba(255,255,255,0.25); }

/* Category colors */
.cat-activity  { background: #D1FAE5; color: #065F46; }
.cat-transport { background: #DBEAFE; color: #1E40AF; }
.cat-hotel     { background: #EDE9FE; color: #5B21B6; }
.cat-food      { background: #FEF3C7; color: #92400E; }
.cat-shopping  { background: #FCE7F3; color: #9D174D; }
.cat-other     { background: var(--border-light); color: var(--muted); }

.cat-stripe-activity  { background: #10B981; }
.cat-stripe-transport { background: #3B82F6; }
.cat-stripe-hotel     { background: #8B5CF6; }
.cat-stripe-food      { background: #F59E0B; }
.cat-stripe-shopping  { background: #EC4899; }
.cat-stripe-other     { background: #9CA3AF; }

body.dark .cat-activity  { background: #064E3B; color: #6EE7B7; }
body.dark .cat-transport { background: #1E3A8A; color: #93C5FD; }
body.dark .cat-hotel     { background: #2E1065; color: #C4B5FD; }
body.dark .cat-food      { background: #78350F; color: #FCD34D; }
body.dark .cat-shopping  { background: #831843; color: #F9A8D4; }

/* ═══ DRIVE FOLDER EMBED ═══ */
.drive-section {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 4px;
  margin-bottom: 24px;
  overflow: hidden;
  transition: background 0.25s;
}

.drive-section-hd {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  cursor: pointer;
  user-select: none;
  gap: 10px;
}

.drive-section-hd:hover { background: var(--bg); }

.drive-section-left { display: flex; align-items: center; gap: 10px; }

.drive-icon {
  width: 28px;
  height: 28px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.drive-section-title {
  font-family: var(--serif);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.1em;
  color: var(--text);
}

.drive-section-sub {
  font-size: 11px;
  color: var(--light);
  margin-top: 1px;
}

.drive-toggle { font-size: 10px; color: var(--light); transition: transform 0.18s; }
.drive-section.expanded .drive-toggle { transform: rotate(180deg); }

.drive-body { display: none; }
.drive-section.expanded .drive-body { display: block; }

.drive-embed-wrap {
  position: relative;
  height: 480px;
  border-top: 1px solid var(--border-light);
}

.drive-embed-wrap iframe {
  width: 100%;
  height: 100%;
  border: none;
  display: block;
  background: var(--bg);
}

.drive-embed-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 200px;
  gap: 10px;
  border-top: 1px solid var(--border-light);
}

.drive-embed-empty-text { font-size: 13px; color: var(--muted); text-align: center; line-height: 1.6; }

.drive-url-row {
  display: flex;
  gap: 8px;
  padding: 12px 16px;
  border-top: 1px solid var(--border-light);
  background: var(--bg);
  align-items: center;
}

.drive-url-input {
  flex: 1;
  padding: 8px 10px;
  font-size: 12px;
  font-family: inherit;
  color: var(--text);
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 3px;
  outline: none;
  transition: border-color 0.15s;
  min-width: 0;
}

.drive-url-input:focus { border-color: var(--red); }
.drive-url-input::placeholder { color: var(--light); }

.drive-url-save {
  background: var(--red);
  color: #fff;
  border: none;
  padding: 8px 14px;
  border-radius: 3px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: background 0.12s;
}

.drive-url-save:hover { background: var(--red-dark); }

.drive-open-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--muted);
  padding: 8px 16px 12px;
  text-decoration: none;
  transition: color 0.12s;
}

.drive-open-btn:hover { color: var(--red); }

@media (max-width: 600px) {
  .drive-embed-wrap { height: 360px; }
  .drive-url-row { flex-direction: column; gap: 6px; }
  .drive-url-input { width: 100%; }
  .drive-url-save { width: 100%; }
}
</style>

<script type="module" src="app.js"></script>
</body>
</html>
