<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Japan 2026</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F8F6F1;
      --card: #FFFFFF;
      --text: #1a1a1a;
      --muted: #6B6B6B;
      --light: #A0A0A0;
      --border: #E2DDD5;
      --border-light: #EDE9E1;
      --vermillion: #C0392B;
      --vermillion-light: #FAF0EF;
      --green-bg: #ECF5EC;
      --green-text: #1B5E20;
      --green-border: #C8E6C9;
      --amber-bg: #FEF8EC;
      --amber-text: #7A5500;
      --mono: 'SF Mono', 'Fira Code', 'Courier New', monospace;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 20px 28px 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .site-title {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.12em;
      color: var(--text);
    }

    .site-sub {
      font-size: 11px;
      color: var(--light);
      letter-spacing: 0.1em;
      margin-top: 3px;
    }

    .edit-btn {
      background: none;
      border: 1px solid var(--border);
      padding: 7px 16px;
      border-radius: 2px;
      font-size: 12px;
      cursor: pointer;
      color: var(--muted);
      letter-spacing: 0.06em;
      transition: border-color 0.15s, color 0.15s;
      white-space: nowrap;
      margin-top: 2px;
    }

    .edit-btn:hover { border-color: var(--vermillion); color: var(--vermillion); }
    .edit-btn.active { background: var(--vermillion); border-color: var(--vermillion); color: #fff; }

    /* ── Tabs ── */
    nav { display: flex; }

    .tab-btn {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      padding: 9px 24px 9px 0;
      font-size: 13px;
      cursor: pointer;
      color: var(--light);
      letter-spacing: 0.07em;
      margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
    }

    .tab-btn.active { color: var(--text); border-bottom-color: var(--vermillion); }
    .tab-btn:hover:not(.active) { color: var(--muted); }

    /* ── Main ── */
    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 36px 16px 100px;
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Destination sections ── */
    .dest-section { margin-bottom: 44px; }

    .dest-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--light);
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 10px;
    }

    /* ── Day cards ── */
    .day-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 2px;
      margin-bottom: 7px;
      overflow: hidden;
    }

    .day-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 18px;
      cursor: pointer;
      user-select: none;
      gap: 12px;
    }

    .day-header:hover { background: #FDFCFA; }

    .day-header-left {
      display: flex;
      align-items: baseline;
      gap: 14px;
      flex-wrap: wrap;
    }

    .day-date {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      color: var(--light);
      text-transform: uppercase;
      white-space: nowrap;
      min-width: 86px;
    }

    .day-title { font-size: 14px; font-weight: 500; }

    .day-location {
      font-size: 11px;
      color: var(--light);
      letter-spacing: 0.03em;
      margin-top: 1px;
    }

    .day-toggle {
      font-size: 10px;
      color: var(--light);
      flex-shrink: 0;
      transition: transform 0.18s;
    }

    .day-card.expanded .day-toggle { transform: rotate(180deg); }

    /* ── Day body ── */
    .day-body {
      display: none;
      padding: 4px 18px 18px;
      border-top: 1px solid var(--border-light);
    }

    .day-card.expanded .day-body { display: block; }

    /* ── Period ── */
    .period { margin-top: 16px; }

    .period-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--light);
      margin-bottom: 7px;
    }

    /* ── Activity items ── */
    .act {
      display: flex;
      gap: 10px;
      padding: 3px 0;
      align-items: flex-start;
      line-height: 1.5;
    }

    .act-time {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--light);
      min-width: 56px;
      padding-top: 2px;
      flex-shrink: 0;
    }

    .act-body { flex: 1; }

    .act-text { font-size: 13.5px; color: var(--text); }

    .act.booked .act-text { color: var(--green-text); }

    .act-sub {
      font-size: 12px;
      color: var(--muted);
      margin-top: 1px;
    }

    .tag {
      display: inline-block;
      font-size: 9.5px;
      font-weight: 600;
      letter-spacing: 0.1em;
      padding: 2px 6px;
      border-radius: 2px;
      vertical-align: middle;
      margin-left: 7px;
    }

    .tag-booked {
      background: var(--green-bg);
      color: var(--green-text);
      border: 1px solid var(--green-border);
    }

    /* ── Tip block ── */
    .tip-block {
      margin-top: 14px;
      padding: 9px 13px;
      background: var(--amber-bg);
      border-left: 2px solid #F0B429;
      font-size: 12.5px;
      color: var(--amber-text);
      line-height: 1.5;
    }

    /* ── Notes ── */
    .notes-section {
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid var(--border-light);
    }

    .notes-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--light);
      margin-bottom: 7px;
    }

    .notes-read {
      font-size: 13px;
      color: var(--muted);
    }

    .notes-read em { font-style: italic; color: var(--light); }

    .notes-edit {
      width: 100%;
      min-height: 68px;
      padding: 9px 11px;
      font-size: 13px;
      font-family: inherit;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 2px;
      resize: vertical;
      line-height: 1.55;
    }

    .notes-edit:focus { outline: none; border-color: var(--vermillion); }

    body.edit-mode .notes-read { display: none; }
    body:not(.edit-mode) .notes-edit { display: none; }

    .save-indicator {
      font-size: 11px;
      color: var(--light);
      margin-top: 4px;
      height: 14px;
      transition: opacity 0.3s;
    }

    body:not(.edit-mode) .save-indicator { display: none; }

    /* ── Confirmations ── */
    .conf-section { margin-bottom: 40px; }

    .conf-section-title {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--light);
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 10px;
    }

    .conf-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 15px 18px;
      margin-bottom: 8px;
    }

    .conf-name {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 11px;
    }

    .conf-row {
      display: flex;
      gap: 10px;
      padding: 4px 0;
      font-size: 13px;
      border-bottom: 1px solid var(--border-light);
    }

    .conf-row:last-child { border-bottom: none; }

    .conf-key {
      color: var(--light);
      font-size: 11.5px;
      min-width: 108px;
      flex-shrink: 0;
      padding-top: 1px;
      letter-spacing: 0.02em;
    }

    .conf-val { flex: 1; color: var(--text); }

    .conf-val.hi {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 600;
      color: var(--green-text);
    }

    /* ── Auth modal ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }

    .overlay.open { display: flex; }

    .modal {
      background: var(--card);
      border-radius: 3px;
      padding: 32px;
      width: 320px;
      max-width: 90vw;
      position: relative;
    }

    .modal-title {
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 20px;
      letter-spacing: 0.04em;
    }

    .modal-close {
      position: absolute;
      top: 14px;
      right: 18px;
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      color: var(--light);
      line-height: 1;
    }

    .modal input {
      width: 100%;
      padding: 10px 12px;
      font-size: 14px;
      border: 1px solid var(--border);
      border-radius: 2px;
      margin-bottom: 11px;
      font-family: inherit;
      background: var(--bg);
    }

    .modal input:focus { outline: none; border-color: var(--vermillion); }

    .modal-btn {
      width: 100%;
      padding: 11px;
      background: var(--vermillion);
      color: #fff;
      border: none;
      border-radius: 2px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: 0.07em;
      transition: background 0.15s;
    }

    .modal-btn:hover { background: #A93226; }

    .modal-err {
      font-size: 12px;
      color: var(--vermillion);
      margin-top: 9px;
      min-height: 16px;
    }

    /* ── Responsive ── */
    @media (max-width: 560px) {
      header { padding: 16px 16px 0; }
      main { padding: 24px 12px 80px; }
      .tab-btn { padding-right: 18px; }
      .conf-key { min-width: 88px; }
      .day-header-left { gap: 6px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <div>
      <div class="site-title">JAPAN 2026</div>
      <div class="site-sub">APRIL 15 – 29 &nbsp;·&nbsp; GWENDALYNN & CHRISTINA</div>
    </div>
    <button class="edit-btn" id="editBtn">&#9998; Edit</button>
  </div>
  <nav>
    <button class="tab-btn active" data-tab="itinerary">Itinerary</button>
    <button class="tab-btn" data-tab="confirmations">Confirmations</button>
  </nav>
</header>

<main>
  <div id="itinerary" class="tab-panel active"></div>
  <div id="confirmations" class="tab-panel"></div>
</main>

<div class="overlay" id="overlay">
  <div class="modal">
    <button class="modal-close" id="modalClose">&times;</button>
    <div class="modal-title">Sign in to edit</div>
    <input type="email" id="authEmail" placeholder="Email" autocomplete="email">
    <input type="password" id="authPassword" placeholder="Password" autocomplete="current-password">
    <button class="modal-btn" id="authSubmit">Sign in</button>
    <div class="modal-err" id="authErr"></div>
  </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
