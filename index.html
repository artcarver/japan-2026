<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Japan 2026">
  <meta name="theme-color" content="#F8F6F1" id="theme-color-meta">
  <title>Japan 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <div class="header-main">
    <div class="header-left">
      <div class="site-title">JAPAN 2026</div>
      <div class="header-meta">
        <span class="trip-status" id="tripStatus">Loading&hellip;</span>
        <span class="jst-clock" id="jstClock"></span>
      </div>
    </div>
    <div class="header-right">
      <input type="search" class="search-input" id="searchInput" placeholder="Search&hellip;" autocomplete="off">
      <button class="icon-btn" id="darkToggle" title="Toggle dark mode" aria-label="Toggle dark mode">&#9790;</button>
      <button class="auth-btn" id="authBtn">
        <img class="user-avatar-sm" id="userAvatarSm" src="" alt="">
        <span id="authBtnLabel">Sign in</span>
      </button>
    </div>
  </div>
  <div class="tabs-row">
    <button class="tab-btn active" data-tab="itinerary">Itinerary</button>
    <button class="tab-btn" data-tab="confirmations">Confirmations</button>
    <button class="tab-btn" data-tab="pretrip">Pre-trip</button>
    <button class="tab-btn" data-tab="budget">Budget</button>
    <button class="tab-btn" data-tab="packing">Packing</button>
  </div>
</header>

<div class="dest-pills-wrap hidden" id="destPillsWrap">
  <div class="dest-pills" id="destPills"></div>
</div>

<main>
  <div id="itinerary"     class="tab-panel active"></div>
  <div id="confirmations" class="tab-panel"></div>
  <div id="pretrip"       class="tab-panel"></div>
  <div id="budget"        class="tab-panel"></div>
  <div id="packing"       class="tab-panel"></div>
</main>

<!-- Currency FAB -->
<button class="currency-fab" id="currencyFab" title="Currency converter">&#165;/$</button>

<!-- Currency Widget -->
<div class="currency-widget hidden" id="currencyWidget">
  <div class="currency-hd">
    <span class="currency-hd-title">Currency Converter</span>
    <button class="currency-close" id="currencyClose">&times;</button>
  </div>
  <div class="currency-body">
    <div class="curr-row">
      <span class="curr-flag">&#165;</span>
      <input type="number" class="curr-input" id="jpyInput" placeholder="0">
      <span class="curr-code">JPY</span>
    </div>
    <div class="curr-swap">&#8645;</div>
    <div class="curr-row">
      <span class="curr-flag">$</span>
      <input type="number" class="curr-input" id="usdInput" placeholder="0">
      <span class="curr-code">USD</span>
    </div>
    <div class="curr-rate" id="currRate">Loading rate&hellip;</div>
  </div>
</div>

<!-- Auth Modal -->
<div class="overlay" id="overlay">
  <div class="auth-modal">
    <button class="auth-modal-close" id="authClose">&times;</button>
    <div class="auth-logo">JAPAN 2026</div>
    <div class="auth-subtitle">Gwen &amp; Christina &middot; Apr 15&ndash;29</div>
    <button class="google-btn" id="googleSignInBtn">
      <svg width="18" height="18" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.28-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      Sign in with Google
    </button>
    <div class="auth-note">Only accessible to Gwen &amp; Christina</div>
    <div class="auth-err" id="authErr"></div>
  </div>
</div>

<!-- Booking Modal -->
<div class="overlay" id="bookingModal">
  <div class="auth-modal" style="text-align:left;width:380px">
    <button class="auth-modal-close" onclick="closeBookingModal()">&times;</button>
    <div class="bm-title" id="bm-title">Add Booking</div>
    <div class="bm-fields">
      <div class="bm-group">
        <label class="bm-label">Name *</label>
        <input class="bm-input" id="bm-name" type="text" placeholder="e.g. Hokuriku Shinkansen">
      </div>
      <div class="bm-row">
        <div class="bm-group">
          <label class="bm-label">Amount *</label>
          <input class="bm-input" id="bm-amt" type="number" min="0" placeholder="0">
        </div>
        <div class="bm-group bm-group-sm">
          <label class="bm-label">Currency</label>
          <select class="bm-input" id="bm-currency">
            <option value="JPY">JPY</option>
            <option value="USD">USD</option>
          </select>
        </div>
      </div>
      <div class="bm-row">
        <div class="bm-group">
          <label class="bm-label">Dates</label>
          <input class="bm-input" id="bm-dates" type="text" placeholder="e.g. Apr 26">
        </div>
        <div class="bm-group">
          <label class="bm-label">Category</label>
          <select class="bm-input" id="bm-cat">
            <option value="accommodation">Accommodation</option>
            <option value="transport">Transport</option>
            <option value="activities">Activities</option>
            <option value="other">Other</option>
          </select>
        </div>
      </div>
    </div>
    <div class="bm-footer">
      <button class="bm-cancel" onclick="closeBookingModal()">Cancel</button>
      <button class="bm-save" onclick="saveBooking()">Save</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="app.js"></script>
</body>
</html>
